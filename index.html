<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Echad Demonios - Padre Amadeud</title>
    
    <!-- Librerías Necesarias -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="js/epub.js"></script>

    <style>
        body {
    margin: 0;
    padding: 0;
    overflow: hidden; 
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* Barra de navegación mejorada */
#nav-bar {
    display: flex;
    flex-direction: row; /* Fuerza una sola línea */
    flex-wrap: nowrap;   /* Evita el salto de línea */
    justify-content: space-between;
    align-items: center;
    padding: 5px;
    gap: 5px;
	background: #2c3e50;
}

#search-container {
    flex-grow: 1; /* El buscador se estira, los botones no */
    display: flex;
    background: #34495e;
    border-radius: 4px;
    height: 35px;
}

.nav-btn {
    min-width: 40px; /* Botones cuadrados más pequeños */
    height: 35px;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}

#search-input {
    width: 100%;
    font-size: 14px;
    padding-left: 8px;
}

/* Contenedor del libro */
#viewer {
    flex: 1; /* Ocupa todo el espacio restante */
    width: 100%;
    max-width: 100%; /* Evita que se salga de la pantalla */
    background: #c3c3c3;
	box-shadow: 0 0 20px rgba(0,0,0,0.2);
	margin: 0 auto;
}

        .nav-btn {
            background: #34495e;
            border: none;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            margin: 0 15px;
            transition: background 0.3s;
        }

        .nav-btn:hover {
            background: #1abc9c;
        }

        /* Contenedor del Libro */
        #viewer {
            width: 100vw;
            height: calc(100vh - 60px); /* Resta la altura de la barra */
            max-width: 900px;
            background: white;
            
        }

        /* Indicador de carga */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2em;
            color: #555;
        }

		#search-container {
    display: flex;
    align-items: center;
    background: #34495e;
    border-radius: 4px;
    padding: 2px 10px;
}

#search-input {
    background: transparent;
    border: none;
    color: white;
    padding: 5px;
    outline: none;
}

#search-input::placeholder {
    color: #bdc3c7;
}

#results-list li:hover {
    background-color: #f1f1f1;
    color: #1abc9c;
}

.navWrapper { max-width: 100vw; margin: 0 auto; 
 display: flex;
    flex-direction: row; /* Fuerza una sola línea */
    flex-wrap: nowrap;   /* Evita el salto de línea */
    justify-content: space-between;
    align-items: center;
}
    </style>
</head>
<body>

    <div id="nav-bar">
		<div class="navWrapper">
		<button id="prev" class="nav-btn">❮</button>
		
		<div id="search-container">
			<input type="text" id="search-input" placeholder="Buscar...">
			<button id="search-button" class="nav-btn">🔍</button>
		</div>

		<button id="next" class="nav-btn">❯</button>
		</div>
	</div>

	<!-- Indicador de página/posición -->
	<div id="page-info" style="background: #2c3e50; color: white; text-align: center; font-size: 0.8em; padding-bottom: 5px; width: 100%;">
		Posición: <span id="current-percent">0</span>%
	</div>

	<!-- Contenedor flotante para resultados -->
	<div id="search-results" style="display:none; position: absolute; top: 60px; background: white; width: 300px; max-height: 400px; overflow-y: auto; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); padding: 10px; border-radius: 0 0 8px 8px;">
		<ul id="results-list" style="list-style: none; padding: 0; margin: 0; font-size: 0.9em;"></ul>
	</div>

    <div id="loading">Abriendo libro sagrado...</div>
    <div id="viewer"></div>

<script type="text/javascript">
    window.onload = function() {
        const viewer = document.getElementById("viewer");
        const loading = document.getElementById("loading");
        const titleTag = document.getElementById("book-title");

        // 1. Inicialización del libro
        const book = ePub("epubFiles/Echad_Demonios/Echad_Demonios.epub");
        // Dentro de tu window.onload, cambia la configuración de rendition:
		const rendition = book.renderTo("viewer", {
			width: "100%",
			height: "100%",
			flow: "paginated", 
			manager: "default",
			// IMPORTANTE: Esto ayuda a que el iframe no ignore el tamaño del contenedor
			allowScriptedContent: true 
		});

		// Forzar el redimensionado si el usuario gira el teléfono
		window.addEventListener("resize", () => {
			rendition.resize();
		});

        // 2. Mostrar el libro
        book.opened.then(() => {
            loading.style.display = "none";
            console.log("✅ Libro abierto");
            
            // Obtener el título de los metadatos
           // book.getMetadata().then(meta => {
             //   titleTag.innerText = meta.title;
           // });

            return rendition.display();
        });

        // 3. Controles de navegación (Botones)
        document.getElementById("next").onclick = function() {
            rendition.next();
        };

        document.getElementById("prev").onclick = function() {
            rendition.prev();
        };

        // 4. Controles de navegación (Teclado)
        document.addEventListener("keydown", function(e) {
            if (e.key === "ArrowRight") rendition.next();
            if (e.key === "ArrowLeft") rendition.prev();
        });

        // 5. Ajustes de estilo interno (Opcional)
        // Esto ayuda si el PDF original era letra muy pequeña
        rendition.themes.default({
			"body": {
				"padding": "0 10px !important", // Menos margen en los lados
				"font-family": "sans-serif !important"
			},
			"p": {
				"font-size": "1.1em !important",
				"line-height": "1.4 !important"
			}
		});

        // Manejo de errores
        book.opened.catch(err => {
            loading.innerText = "❌ Error al cargar el archivo .epub";
            console.error(err);
        });

		// --- Lógica del Buscador ---
const searchInput = document.getElementById("search-input");
const searchButton = document.getElementById("search-button");
const resultsContainer = document.getElementById("search-results");
const resultsList = document.getElementById("results-list");

// Definimos la función de búsqueda por separado para reutilizarla
function ejecutarBusqueda() {
    console.log("Botón presionado o Enter detectado"); // Para depuración
    const query = searchInput.value;
    
    if (!query) {
        console.warn("Búsqueda vacía");
        return;
    }

    // Aquí va toda tu lógica de book.spine.spineItems.map...
    // (La misma que ya teníamos para generar los resultados)
    doSearch();
}

function doSearch() {
    const query = searchInput.value.trim();
    if (!query) return;

    console.log("🔍 Buscando:", query);

    resultsContainer.style.display = "block";
    resultsList.innerHTML = "<li style='padding:10px; color:#555;'>🔍 Buscando bendiciones...</li>";

    Promise.all(
        book.spine.spineItems.map(item => 
            item.load(book.load.bind(book))
                .then(item.find.bind(item, query))
                .finally(item.unload.bind(item))
        )
    ).then(results => {
        const flatResults = [].concat.apply([], results);
        resultsList.innerHTML = ""; 

        if (flatResults.length === 0) {
            resultsList.innerHTML = "<li style='padding:10px;'>No se encontraron coincidencias.</li>";
            return;
        }

        flatResults.forEach(result => {
            const li = document.createElement("li");
            li.style.cssText = "border-bottom:1px solid #eee; padding:12px; cursor:pointer; list-style:none;";
            
            li.innerHTML = `<small>Cerca de:</small><br><strong>${result.excerpt}</strong>`;
            
            li.addEventListener("click", (e) => {
                e.stopPropagation();
                rendition.display(result.cfi);
                resultsContainer.style.display = "none";
            });
            resultsList.appendChild(li);
        });
    }).catch(err => {
        console.error("Error:", err);
        resultsList.innerHTML = "<li>Error al procesar la búsqueda.</li>";
    });
}

// Vinculamos el evento ENTER al input
searchInput.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        ejecutarBusqueda();
    }
});

// 1. Vinculamos el botón usando 'pointerdown' (más rápido que click y mousedown)
searchButton.addEventListener("pointerdown", function(e) {
    // Evitamos que el foco salte y cierre el buscador antes de tiempo
    e.preventDefault(); 
    doSearch();
});

// 2. Modificamos el cierre externo para que sea más inteligente
document.addEventListener("pointerdown", (e) => {
    // Si el usuario toca el input o el botón, NO cerramos nada
    if (searchInput.contains(e.target) || searchButton.contains(e.target)) {
        return; 
    }
    
    // Si toca los resultados, tampoco cerramos (para que pueda hacer clic en ellos)
    if (resultsContainer.contains(e.target)) {
        return;
    }

    // Solo si toca cualquier otra cosa, ocultamos
    resultsContainer.style.display = "none";
});



// ... dentro de window.onload ...
// ... dentro de window.onload ...
// --- Persistencia V2: Blindaje para Móviles ---

let locationsReady = false;
let isResuming = true; // Bloqueo de escritura inicial

book.ready.then(() => {
    const key = book.key() + "-locations";
    const storedLocations = localStorage.getItem(key);
    
    if (storedLocations) {
        console.log("🚀 Cargando desde caché...");
        try {
            return book.locations.load(storedLocations);
        } catch (e) {
            return generarYGuardarLocaciones(key);
        }
    } else {
        return generarYGuardarLocaciones(key);
    }
}).then(() => {
    locationsReady = true;
    console.log("✅ 1. Locaciones listas.");
    return rendition.started; 
}).then(() => {
    const lastLocation = localStorage.getItem("lastBookLocation");
    
    if (lastLocation) {
        console.log("📍 2. Saltando a posición:", lastLocation);
        // FORZAMOS el display y esperamos a que termine
        return rendition.display(lastLocation);
    } else {
        return rendition.display();
    }
}).then(() => {
    // 3. UNA VEZ TERMINADO EL SALTO, calculamos el % inicial
    const currentCfi = rendition.currentLocation().start.cfi;
    actualizarPorcentajeManual(currentCfi);
    
    // 4. EL SECRETO: No habilitamos el guardado inmediatamente.
    // Esperamos 2 segundos para que el celular termine de procesar el render.
    setTimeout(() => {
        isResuming = false; 
        console.log("💾 3. Sistema activo. Ya puedes navegar.");
    }, 2000); 
});

// Evento de navegación
rendition.on("relocated", (location) => {
    const cfi = location.start.cfi;

    // Solo guardamos si YA NO estamos reanudando
    if (!isResuming && cfi) {
        localStorage.setItem("lastBookLocation", cfi);
        console.log("💾 Guardando posición actual...");
    }

    // El porcentaje siempre intenta actualizarse si las locaciones existen
    if (locationsReady) {
        actualizarPorcentajeManual(cfi);
    }
});

function generarYGuardarLocaciones(key) {
    console.log("⏳ Generando mapa...");
    return book.locations.generate(1024).then(() => {
        const saved = book.locations.save();
        localStorage.setItem(key, saved);
        return saved;
    });
}

// 2. Función de porcentaje (Mantenemos tu lógica de reintentos por seguridad)
function actualizarPorcentajeManual(cfi, intentos = 0) {
    if (!cfi || !locationsReady) return;

    const percent = book.locations.percentageFromCfi(cfi);
    
    if (percent >= 0) {
        const percentage = Math.floor(percent * 100);
        const el = document.getElementById("current-percent");
        if (el) el.innerText = percentage;
        console.log(`📊 Interfaz al: ${percentage}%`);
    } else if (intentos < 10) { 
        setTimeout(() => actualizarPorcentajeManual(cfi, intentos + 1), 500);
    }
}

// 3. Evento de navegación
rendition.on("relocated", (location) => {
    const cfi = location.start.cfi;
    
    // SOLO guardamos si no estamos en medio de la reanudación inicial
    if (!isResuming && cfi) {
        localStorage.setItem("lastBookLocation", cfi);
        console.log("💾 Posición guardada.");
    }
    
    actualizarPorcentajeManual(cfi); 
});

    };
</script>
</body>
</html>
